<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الملف الشخصي - World of Nona 👤</title>

    <!-- ربط الملفات العامة والخاصة بالصفحة -->
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="profile.css">
</head>
<body>

    <header id="main-navbar">
        <!-- سيتم تحميل القائمة من navbar.html -->
    </header>

    <main id="app-content">
        <section class="profile-header">
            <h1>الملف الشخصي 👤</h1>
            <p>إدارة البيانات الشخصية والأكاديمية الخاصة بكِ 🎓</p>
        </section>

        <div class="profile-grid">
            <!-- بطاقة المعاينة -->
            <div class="card profile-card">
                <div class="avatar-container">
                    <div class="avatar-placeholder">👤</div>
                </div>
                <h3>طالبة مميزة ✨</h3>
                <p class="student-id">رقم التسجيل: 202690801</p>
                <span class="badge badge-active">نشط 🟢</span>
            </div>

            <!-- نموذج تعديل البيانات -->
            <div class="card profile-form-card">
                <h3>تعديل البيانات الشخصية 📝</h3>
                <form id="profile-form">
                    <div class="form-group">
                        <label for="fullname">الاسم الكامل 👤</label>
                        <input type="text" id="fullname" class="form-control" value="نونة" required>
                    </div>

                    <div class="form-group">
                        <label for="email">البريد الإلكتروني ✉️</label>
                        <input type="email" id="email" class="form-control" value="nona@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="specialty">التخصص 📚</label>
                        <input type="text" id="specialty" class="form-control" value="تطوير تطبيقات الويب (PWA)" readonly>
                    </div>

                    <button type="submit" class="btn btn-primary">حفظ التغييرات 💾</button>
                </form>
            </div>
        </div>
    </main>

    <footer id="main-footer">
        <p>All rights reserved World of Nona 2026</p>
    </footer>

    <script src="../../assets/js/global.js"></script>
    <script src="profile.js"></script>
</body>
</html>
