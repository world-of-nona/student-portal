<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإعدادات - World of Nona 🎓</title>

    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/components.css">

    <style>
        .settings-container {
            max-width: 600px;
            margin: 30px auto;
            padding: 20px;
        }
        .settings-card {
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .setting-item:last-child {
            border-bottom: none;
        }
        .btn-action {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-theme {
            background-color: var(--primary-color);
            color: white;
        }
        .btn-danger {
            background-color: #E74C3C;
            color: white;
        }
    </style>
</head>
<body>

    <header id="main-navbar">
        <!-- القائمة العلوية -->
    </header>

    <main id="app-content" class="settings-container">
        <h2>إعدادات التطبيق ⚙️</h2>

        <section class="card settings-card">
            <div class="setting-item">
                <div>
                    <strong>المظهر (Dark Mode) 🌙</strong>
                    <p style="margin: 5px 0 0 0; font-size: 13px; color: var(--secondary-color);">التبديل بين النمط الفاتح والداكن</p>
                </div>
                <button id="theme-toggle-btn" class="btn-action btn-theme">تغيير المظهر</button>
            </div>

            <div class="setting-item">
                <div>
                    <strong>مسح البيانات 🧹</strong>
                    <p style="margin: 5px 0 0 0; font-size: 13px; color: var(--secondary-color);">إعادة تعيين المحفوظات والبيانات المحلية</p>
                </div>
                <button id="reset-data-btn" class="btn-action btn-danger">إعادة ضبط ⚠️</button>
            </div>
        </section>
    </main>

    <footer id="main-footer" style="text-align: center; padding: 20px; color: #888; margin-top: 40px;">
        <p>All rights reserved World of Nona 2026</p>
    </footer>

    <script src="../../assets/js/global.js"></script>
    <script src="settings.js"></script>
</body>
</html>
