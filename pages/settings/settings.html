<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإعدادات - World of Nona 🎓</title>

    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/components.css">

    <style>
        .settings-container {
            max-width: 600px;
            margin: 30px auto;
            padding: 20px;
        }
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 12px;
        }
        .btn-action {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-theme {
            background-color: var(--primary-color, #4A90E2);
            color: white;
        }
        .btn-logout {
            background-color: #E74C3C;
            color: white;
        }
    </style>
</head>
<body>

    <header id="main-navbar">
        <!-- القائمة العلوية -->
    </header>

    <main id="app-content" class="settings-container">
        <h2>إعدادات التطبيق ⚙️</h2>

        <div class="card setting-item">
            <div>
                <h3 style="margin:0;">المظهر والنمط 🌙</h3>
                <p style="margin:5px 0 0 0; color:#888; font-size:14px;">التبديل بين النمط الداكن والفاتح</p>
            </div>
            <button id="toggle-theme-btn" class="btn-action btn-theme">تغيير النمط 🌙</button>
        </div>

        <div class="card setting-item">
            <div>
                <h3 style="margin:0;">الحساب والجلسة 👤</h3>
                <p style="margin:5px 0 0 0; color:#888; font-size:14px;">تسجيل الخروج من الحساب الحالي</p>
            </div>
            <button id="logout-btn" class="btn-action btn-logout">تسجيل الخروج 🚪</button>
        </div>
    </main>

    <footer id="main-footer" style="text-align: center; padding: 20px; color: #888; margin-top: 40px;">
        <p>All rights reserved World of Nona 2026</p>
    </footer>

    <script src="../../assets/js/global.js"></script>
    <script src="settings.js"></script>
</body>
</html>
