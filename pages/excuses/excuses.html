<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقديم مبررات الغياب - World of Nona 📝</title>

    <!-- ربط الملفات العامة والخاصة بالصفحة -->
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="excuses.css">
</head>
<body>

    <header id="main-navbar">
        <!-- سيتم تحميل القائمة من navbar.html -->
    </header>

    <main id="app-content">
        <section class="excuses-header">
            <h1>تقديم ومتابعة مبررات الغياب 📝</h1>
            <p>يمكنكِ إرسال المبررات الطبية أو الإدارية ومتابعة حالة قبولها 📂</p>
        </section>

        <!-- نموذج تقديم مبرر جديد -->
        <div class="card excuse-form-card">
            <h3>إرسال مبرر جديد 📤</h3>
            <form id="excuse-form">
                <div class="form-group">
                    <label for="excuse-date">تاريخ الغياب 📅</label>
                    <input type="date" id="excuse-date" class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="excuse-reason">سبب الغياب 💬</label>
                    <textarea id="excuse-reason" class="form-control" rows="3" placeholder="اذكري سبب الغياب اختصاراً..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="excuse-file">المرفق (شهادة طبية / وثيقة) 📎</label>
                    <input type="file" id="excuse-file" class="form-control" accept=".pdf,.png,.jpg,.jpeg">
                </div>

                <button type="submit" class="btn btn-primary">إرسال المبرر 🚀</button>
            </form>
        </div>

        <!-- جدول المبررات السابقة -->
        <div class="card excuses-list-card">
            <h3>سجل المبررات المقدمة 📋</h3>
            <table class="excuses-table">
                <thead>
                    <tr>
                        <th>تاريخ الغياب 📅</th>
                        <th>السبب 💬</th>
                        <th>حالة الطلب 📌</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>2026-07-22</td>
                        <td>عذر طبي (شهادة طبية)</td>
                        <td><span class="badge badge-pending">قيد المراجعة ⏳</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer id="main-footer">
        <p>All rights reserved World of Nona 2026</p>
    </footer>

    <script src="../../assets/js/global.js"></script>
    <script src="excuses.js"></script>
</body>
</html>
