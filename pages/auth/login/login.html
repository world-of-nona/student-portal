<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World of Nona - تسجيل الدخول</title>
    <!-- ربط ملف الـ CSS الخارجي -->
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="auth-container">
        <div class="logo-area">🎓🌍</div>
        <h1 class="brand-title">World of Nona</h1>
        <p class="brand-subtitle">منصة علوم الطبيعة والحياة - L1 SNV 🍃🌱</p>

        <div class="tabs-container">
            <a href="login.html" class="auth-tab active">تسجيل الدخول</a>
            <a href="../register/register.html" class="auth-tab">إنشاء حساب</a>
        </div>

        <!-- تم إضافة id="login-form" لربطه بملف الجافاسكريبت -->
        <form id="login-form">
            <div class="input-group">
                <label class="input-label" for="username">البريد الإلكتروني أو رقم البطاقة 🪪</label>
                <input type="text" id="username" class="auth-input" placeholder="أدخل البريد الجامعي أو الرقم" required>
            </div>

            <div class="input-group">
                <label class="input-label" for="password">كلمة المرور 🔒</label>
                <input type="password" id="password" class="auth-input" placeholder="••••••••" required>
            </div>

            <div class="form-options">
                <label style="display: flex; align-items: center; gap: 4px; cursor: pointer;">
                    <input type="checkbox" checked> تذكرني في هذا الجهاز
                </label>
                <select style="padding: 2px 6px; border-radius: 6px; border: 1px solid #cbd5e0; font-size: 10px;">
                    <option>لمدة اسبوع</option>
                    <option>لمدة شهر</option>
                </select>
            </div>

            <button type="submit" class="btn-submit">
                دخول للحساب 🚀
            </button>
        </form>

        <div class="divider-text">أو للتصفح السريع</div>

        <a href="../guest/guest.html" class="btn-guest">
            <span>👤</span> الدخول كضيف
        </a>

        <div class="footer-emojis">🍃 🌿 🌱</div>
        <div class="footer-rights">All rights reserved World of Nona 2026</div>
    </div>

    <!-- ربط ملف الـ JavaScript الخارجي -->
    <script src="login.js"></script>
</body>
</html>
