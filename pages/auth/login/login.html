<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - World of Nona 🔐</title>
    
    <!-- ربط الملفات العامة والخاصة بالصفحة -->
    <link rel="stylesheet" href="../../../assets/css/global.css">
    <link rel="stylesheet" href="../../../assets/css/components.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <main class="login-container">
        <div class="card login-card">
            <h2>تسجيل الدخول 🔑</h2>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="email">البريد الإلكتروني ✉️</label>
                    <input type="email" id="email" class="form-control" placeholder="example@domain.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">كلمة المرور 🔒</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-full">دخول 🚀</button>
            </form>
            
            <p class="register-link">ليس لديكِ حساب؟ <a href="../register/register.html">إنشاء حساب جديد</a></p>
        </div>
    </main>

    <footer id="main-footer">
        <p>All rights reserved World of Nona 2026</p>
    </footer>

    <script src="../../../assets/js/global.js"></script>
    <script src="login.js"></script>
</body>
</html>
