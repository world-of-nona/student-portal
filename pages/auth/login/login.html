<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World of Nona 🌿 - تسجيل الدخول</title>
    <link rel="stylesheet" href="../../assets/css/global.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">

    <div class="auth-wrapper">
        
        <!-- الشعار الأيقوني 🎓🌍 -->
        <div style="font-size: 65px; margin-bottom: 10px;">🌍🎓</div>
        
        <h1 class="auth-title">World of Nona</h1>
        <p class="auth-subtitle">منصة علوم الطبيعة والحياة - L1 SNV 🎓🌱</p>

        <!-- تبويب الاختيار (تسجيل الدخول / إنشاء حساب) 🔄 -->
        <div class="auth-tabs">
            <a href="login.html" class="auth-tab active">تسجيل الدخول</a>
            <a href="register.html" class="auth-tab">إنشاء حساب</a>
        </div>

        <form id="login-form" onsubmit="handleLogin(event)">
            
            <div class="form-group">
                <label class="form-label">البريد الإلكتروني أو رقم البطاقة 🪪</label>
                <input type="text" class="form-input" placeholder="أدخل البريد الجامعي أو الرقم" required>
            </div>

            <div class="form-group">
                <label class="form-label">كلمة المرور 🔒</label>
                <input type="password" class="form-input" placeholder="••••••••" required>
            </div>

            <div class="form-options">
                <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                    <input type="checkbox" checked>
                    تذكرني في هذا الجهاز
                </label>
                <select style="padding: 4px 8px; border-radius: 8px; border: 1px solid #E2E8F0; font-size: 11px;">
                    <option>لمدة اسبوع</option>
                    <option>لمدة شهر</option>
                </select>
            </div>

            <!-- زر الدخول الرئيسي 🚀 -->
            <button type="submit" class="btn-primary-action">
                دخول للحساب 🚀
            </button>

        </form>

        <p style="font-size: 12px; color: #A0AEC0; margin: 15px 0 5px 0;">أو للتصفح السريع</p>

        <!-- زر الدخول كضيف 👤 -->
        <a href="guest.html" class="btn-guest-action">
            <span>👤</span> الدخول كضيف
        </a>

        <!-- الرموز والفوتر 🍃 -->
        <div style="margin-top: 25px; font-size: 20px;">🍃 🌿 🌱</div>
        <p style="font-size: 11px; color: #A0AEC0; margin-top: 15px;">All rights reserved World of Nona 2026</p>

    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            window.location.href = "../dashboard/dashboard.html";
        }
    </script>
    <script src="../../assets/js/global.js"></script>
</body>
</html>
