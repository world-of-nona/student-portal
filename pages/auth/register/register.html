<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World of Nona 🌿 - إنشاء حساب</title>
    <link rel="stylesheet" href="../../assets/css/global.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">

    <div class="auth-wrapper">
        
        <div style="font-size: 65px; margin-bottom: 10px;">🌍🎓</div>
        
        <h1 class="auth-title">World of Nona</h1>
        <p class="auth-subtitle">منصة علوم الطبيعة والحياة - L1 SNV 🎓🌱</p>

        <!-- تبويب الاختيار 🔄 -->
        <div class="auth-tabs">
            <a href="login.html" class="auth-tab">تسجيل الدخول</a>
            <a href="register.html" class="auth-tab active">إنشاء حساب</a>
        </div>

        <form id="register-form" onsubmit="handleRegister(event)">
            
            <div class="form-group">
                <label class="form-label">الاسم واللقب 👤</label>
                <input type="text" class="form-input" placeholder="أدخلي اسمكِ الكامل" required>
            </div>

            <div class="form-group">
                <label class="form-label">البريد الإلكتروني الجامعي 📧</label>
                <input type="email" class="form-input" placeholder="student@univ.dz" required>
            </div>

            <div class="form-group">
                <label class="form-label">كلمة المرور 🔒</label>
                <input type="password" class="form-input" placeholder="••••••••" required>
            </div>

            <!-- زر إنشاء الحساب 🚀 -->
            <button type="submit" class="btn-primary-action">
                إنشاء حساب جديد ✨
            </button>

        </form>

        <!-- الرموز والفوتر 🍃 -->
        <div style="margin-top: 25px; font-size: 20px;">🍃 🌿 🌱</div>
        <p style="font-size: 11px; color: #A0AEC0; margin-top: 15px;">All rights reserved World of Nona 2026</p>

    </div>

    <script>
        function handleRegister(e) {
            e.preventDefault();
            alert("تم إنشاء الحساب بنجاح! 🎉");
            window.location.href = "../dashboard/dashboard.html";
        }
    </script>
    <script src="../../assets/js/global.js"></script>
</body>
</html>
