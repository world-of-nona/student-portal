<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد - World of Nona 📝</title>
    
    <!-- ربط الملفات العامة والخاصة بالصفحة -->
    <link rel="stylesheet" href="../../../assets/css/global.css">
    <link rel="stylesheet" href="../../../assets/css/components.css">
    <link rel="stylesheet" href="register.css">
</head>
<body>

    <main class="register-container">
        <div class="card register-card">
            <h2>إنشاء حساب جديد 📝</h2>
            
            <form id="register-form">
                <div class="form-group">
                    <label for="fullname">الاسم الكامل 👤</label>
                    <input type="text" id="fullname" class="form-control" placeholder="ادخلي اسمكِ الكامل" required>
                </div>

                <div class="form-group">
                    <label for="email">البريد الإلكتروني ✉️</label>
                    <input type="email" id="email" class="form-control" placeholder="example@domain.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">كلمة المرور 🔒</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label for="confirm-password">تأكيد كلمة المرور 🔒</label>
                    <input type="password" id="confirm-password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-full">إنشاء الحساب 🚀</button>
            </form>
            
            <p class="login-link">لديكِ حساب بالفعل؟ <a href="../login/login.html">تسجيل الدخول</a></p>
        </div>
    </main>

    <footer id="main-footer">
        <p>All rights reserved World of Nona 2026</p>
    </footer>

    <script src="../../../assets/js/global.js"></script>
    <script src="register.js"></script>
</body>
</html>
