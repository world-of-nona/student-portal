<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World of Nona - الدخول كضيف</title>
    <style>
        body {
            background-color: #F4F8F5;
            background-image: radial-gradient(#d1e7dd 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            font-family: 'Tajawal', sans-serif;
        }
        .auth-container {
            width: 100%;
            max-width: 400px;
            background: #ffffff;
            border-radius: 25px;
            padding: 25px 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid #e2ece6;
            text-align: center;
        }
        .logo-area { font-size: 55px; margin-bottom: 5px; }
        .brand-title { font-family: 'Comic Sans MS', cursive, sans-serif; font-size: 26px; font-weight: bold; color: #2b5d44; margin: 0; }
        .brand-subtitle { font-size: 12px; color: #557163; margin-top: 4px; margin-bottom: 20px; font-weight: 600; }
        .guest-box { background: #f0faf4; border: 1px solid #bce2ce; padding: 15px; border-radius: 16px; margin-bottom: 20px; text-align: right; font-size: 12px; color: #385d4c; line-height: 1.5; }
        .btn-submit { width: 100%; padding: 13px; background: linear-gradient(135deg, #38ad8a 0%, #2d9373 100%); border: none; border-radius: 16px; color: white; font-size: 15px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 12px rgba(45, 147, 115, 0.2); text-decoration: none; display: block; box-sizing: border-box; margin-bottom: 12px; }
        .btn-back { width: 100%; padding: 11px; background: transparent; border: 2px dashed #bce2ce; border-radius: 16px; color: #2d9373; font-size: 13px; font-weight: bold; text-decoration: none; display: block; box-sizing: border-box; }
        .footer-emojis { margin-top: 25px; font-size: 16px; }
        .footer-rights { font-size: 10px; color: #a0aec0; margin-top: 8px; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="logo-area">👤🌿</div>
        <h1 class="brand-title">أهلاً بكِ في وضع الضيف</h1>
        <p class="brand-subtitle">World of Nona - L1 SNV 🍃</p>

        <div class="guest-box">
            💡 <strong>ملاحظة:</strong> تصفح الضيف يتيح لكِ الاطلاع الكامل على الدروس والمقاييس دون إمكانية حفظ التقدم الشخصي أو المفضلة.
        </div>

        <a href="../../dashboard/dashboard.html" class="btn-submit">
            متابعة إلى التطبيق 🚀
        </a>

        <a href="../login/login.html" class="btn-back">
            العودة لتسجيل الدخول 🔑
        </a>

        <div class="footer-emojis">🍃 🌿 🌱</div>
        <div class="footer-rights">All rights reserved World of Nona 2026</div>
    </div>

</body>
</html>
