<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<body>

    <header id="main-navbar">

                        <td>15 / 20</td>

                    <tr>
                        <td>قواعد البيانات</td>
                        <td>14 / 20</td>

    <footer id="main-footer">
