<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة العلامات - World of Nona 🎓</title>

    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/components.css">

    <style>
        .grades-container {
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
        }
        .gpa-card {
            text-align: center;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
        }
        .gpa-card h2 {
            margin: 0 0 10px 0;
            color: var(--secondary-color);
        }
        .gpa-card .gpa-score {
            font-size: 32px;
            font-weight: bold;
            color: var(--primary-color, #4A90E2);
        }
        .form-card {
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        .form-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .form-group {
            flex: 1;
            min-width: 180px;
            margin-bottom: 15px;
            text-align: right;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color, #ccc);
            border-radius: 8px;
            box-sizing: border-box;
            background-color: var(--card-bg);
            color: var(--text-color);
        }
        .btn-submit {
            padding: 10px 25px;
            background-color: var(--primary-color, #4A90E2);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid var(--border-color, #eee);
        }
        th {
            background-color: rgba(0, 0, 0, 0.03);
        }
    </style>
</head>
<body>

    <header id="main-navbar">
        <!-- القائمة العلوية -->
    </header>

    <main id="app-content" class="grades-container">
        <section class="card gpa-card">
            <h2>المعدل العام التقديري 💯</h2>
            <div class="gpa-score" id="gpa-value">-- / 20</div>
        </section>

        <section class="card form-card">
            <h3>إضافة علامة جديدة ✏️</h3>
            <form id="grade-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="subject">اسم المادة 📚</label>
                        <input type="text" id="subject" placeholder="مثال: البرمجة" required>
                    </div>
                    <div class="form-group">
                        <label for="score">العلامة (/20) 🎯</label>
                        <input type="number" id="score" min="0" max="20" step="0.25" placeholder="15" required>
                    </div>
                    <div class="form-group">
                        <label for="coeff">المعامل (Coeff) ⚖️</label>
                        <input type="number" id="coeff" min="1" max="10" step="1" value="1" required>
                    </div>
                </div>
                <button type="submit" class="btn-submit">حفظ العلامة 💾</button>
            </form>
        </section>

        <h3>قائمة العلامات المسجلة 📋</h3>
        <div class="card" style="padding: 15px; border-radius: 12px; overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>المادة</th>
                        <th>العلامة</th>
                        <th>المعامل</th>
                        <th>الإجراء</th>
                    </tr>
                </thead>
                <tbody id="grade-list">
                    <!-- سيتم إضافة العلامات هنا dynamic -->
                </tbody>
            </table>
        </div>
    </main>

    <footer id="main-footer" style="text-align: center; padding: 20px; color: #888; margin-top: 40px;">
        <p>All rights reserved World of Nona 2026</p>
    </footer>

    <script src="../../assets/js/global.js"></script>
    <script src="grades.js"></script>
</body>
</html>
