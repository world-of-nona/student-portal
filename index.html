<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World of Nona 🌿 - تسجيل الدخول</title>
    <!-- خط Tajawal للواجهة + خط Caveat اليدوي للشعار -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #2A9D8F;
            --primary-dark: #1F7268;
            --bg-mint: #F0F7F4;
            --card-bg: #FFFFFF;
            --text-color: #2D3748;
            --text-muted: #718096;
            --border-color: #E2E8F0;
            --radius-lg: 20px;
            --radius-md: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-mint);
            background-image: radial-gradient(#2a9d8f15 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .mobile-card {
            width: 100%;
            max-width: 430px;
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: 0 10px 30px rgba(42, 157, 143, 0.12);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid rgba(42, 157, 143, 0.15);
        }

        /* Header Visual Layer */
        .app-header {
            background: linear-gradient(180deg, #E8F5E9 0%, #FFFFFF 100%);
            color: var(--text-color);
            padding: 25px 20px 15px 20px;
            text-align: center;
            border-bottom: 1px solid #E2E8F0;
            position: relative;
        }

        /* Microscope & Pastel Globe Logo Styles */
        .logo-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 5px;
        }

        .handwritten-brand {
            font-family: 'Caveat', cursive;
            font-size: 38px;
            color: #1F7268;
            font-weight: 700;
            margin-top: -8px;
            letter-spacing: 1px;
            text-shadow: 1px 1px 0px rgba(255, 255, 255, 0.8);
        }

        .app-header p {
            font-size: 13px;
            color: var(--primary-dark);
            font-weight: 700;
            margin-top: 2px;
        }

        /* Custom Tabs Switcher */
        .tab-switcher {
            display: flex;
            background: #E8F3EE;
            margin: 15px 20px 10px 20px;
            padding: 5px;
            border-radius: var(--radius-md);
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-muted);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--card-bg);
            color: var(--primary-green);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* Form Area */
        .form-container {
            padding: 15px 20px 25px 20px;
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .input-group {
            margin-bottom: 14px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 5px;
        }

        .input-control {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 13px;
            background-color: #FAFCFA;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-control:focus {
            border-color: var(--primary-green);
            background-color: #FFFFFF;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        .input-row .input-group {
            flex: 1;
        }

        /* OTP Input Flex Layout */
        .otp-box {
            display: flex;
            gap: 8px;
        }

        .btn-otp {
            padding: 0 12px;
            background-color: #E8F3EE;
            color: var(--primary-dark);
            border: 1px solid var(--primary-green);
            border-radius: var(--radius-md);
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }

        /* Remember Me Select box */
        .remember-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            font-size: 12px;
        }

        .remember-select {
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            font-size: 11px;
            outline: none;
        }

        /* Primary Action Buttons */
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--primary-green);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(42, 157, 143, 0.25);
            transition: background 0.2s;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .divider {
            text-align: center;
            margin: 15px 0;
            font-size: 11px;
            color: var(--text-muted);
        }

        .btn-guest {
            width: 100%;
            padding: 12px;
            background: transparent;
            color: var(--primary-green);
            border: 1.5px dashed var(--primary-green);
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        /* Nature Decorative Vector Footer */
        .nature-decoration {
            text-align: center;
            padding: 10px 0 5px 0;
            font-size: 18px;
            user-select: none;
        }

        .app-footer {
            text-align: center;
            font-size: 10px;
            color: var(--text-muted);
            padding: 12px 0;
            border-top: 1px solid #F0F0F0;
            direction: ltr;
        }
    </style>
</head>
<body>

<div class="mobile-card">
    <!-- Header with Microscope + Pastel Globe SVG Logo -->
    <header class="app-header">
        <div class="logo-wrapper">
            <svg width="120" height="110" viewBox="0 0 200 180" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Microscope Top Objective Lens Holder -->
                <rect x="85" y="5" width="30" height="10" rx="3" fill="#4A5568"/>
                <path d="M70 15 H130 L122 32 H78 Z" fill="#718096"/>
                <path d="M78 32 L65 50 H135 L122 32 Z" fill="#2D3748"/>
                <rect x="92" y="50" width="16" height="12" fill="#CBD5E0"/>
                
                <!-- Microscope Light Focus Cone -->
                <polygon points="65,60 135,60 155,160 45,160" fill="url(#lightGrad)" opacity="0.15"/>
                
                <!-- Pastel Globe Under Microscope Circle -->
                <circle cx="100" cy="115" r="50" fill="#E8F5E9" stroke="#2A9D8F" stroke-width="3.5"/>
                
                <!-- Pastel Green Continents -->
                <path d="M65 95 C70 88 82 82 88 92 C92 102 78 112 68 108 Z" fill="#81C784"/>
                <path d="M112 85 C125 80 138 92 130 105 C120 112 108 108 112 85 Z" fill="#81C784"/>
                <path d="M82 132 C95 128 115 136 108 148 C95 152 82 144 82 132 Z" fill="#81C784"/>
                
                <!-- Subtle Globe Latitude Lines -->
                <circle cx="100" cy="115" r="50" stroke="#A5D6A7" stroke-width="1" stroke-dasharray="3 2" fill="none"/>
                <ellipse cx="100" cy="115" rx="25" ry="50" stroke="#A5D6A7" stroke-width="1" stroke-dasharray="3 2" fill="none"/>
                <line x1="50" y1="115" x2="150" y2="115" stroke="#A5D6A7" stroke-width="1" stroke-dasharray="3 2"/>
                
                <!-- Lens Reflection Glare -->
                <path d="M130 80 A 45 45 0 0 0 100 70" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

                <!-- SVG Gradients -->
                <defs>
                    <linearGradient id="lightGrad" x1="100" y1="60" x2="100" y2="160" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#2A9D8F"/>
                        <stop offset="1" stop-color="#2A9D8F" stop-opacity="0"/>
                    </linearGradient>
                </defs>
            </svg>
            <div class="handwritten-brand">World of Nona</div>
        </div>
        <p>منصة علوم الطبيعة والحياة - L1 SNV 🧬🌱</p>
    </header>

    <!-- Navigation Tabs -->
    <div class="tab-switcher">
        <button class="tab-btn active" onclick="switchTab('login')">تسجيل الدخول</button>
        <button class="tab-btn" onclick="switchTab('signup')">إنشاء حساب</button>
    </div>

    <!-- Forms Area -->
    <div class="form-container">
        
        <!-- 1. LOGIN FORM -->
        <form id="loginForm" class="form-section active" onsubmit="event.preventDefault();">
            <div class="input-group">
                <label>البريد الإلكتروني أو رقم البطاقة 🪪</label>
                <input type="text" class="input-control" placeholder="أدخل البريد الجامعي أو الرقم" required>
            </div>

            <div class="input-group">
                <label>كلمة المرور 🔒</label>
                <input type="password" class="input-control" placeholder="••••••••" required>
            </div>

            <div class="remember-container">
                <label>☑️ تذكرني في هذا الجهاز:</label>
                <select class="remember-select">
                    <option value="week">لمدة أسبوع</option>
                    <option value="month">لمدة شهر</option>
                    <option value="year">لمدة سنة</option>
                </select>
            </div>

            <button type="submit" class="btn-primary">دخول للحساب 🚀</button>

            <div class="divider">أو للتصفح السريع</div>

            <button type="button" class="btn-guest" onclick="location.href='dashboard.html'">الدخول كضيف 👤</button>
        </form>

        <!-- 2. SIGNUP FORM -->
        <form id="signupForm" class="form-section" onsubmit="event.preventDefault();">
            
            <div class="input-group">
                <label>رقم بطاقة الطالب / البريد الجامعي 📧</label>
                <div class="otp-box">
                    <input type="text" class="input-control" placeholder="مثال: student@univ.dz" required>
                    <button type="button" class="btn-otp">إرسال الرمز 📩</button>
                </div>
            </div>

            <div class="input-group">
                <label>كود التحقق (OTP) 🔑</label>
                <input type="text" class="input-control" placeholder="أدخل الكود المكون من 4 أرقام">
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label>كلمة المرور 🔒</label>
                    <input type="password" class="input-control" placeholder="••••••••" required>
                </div>
                <div class="input-group">
                    <label>تأكيد كلمة المرور 🔒</label>
                    <input type="password" class="input-control" placeholder="••••••••" required>
                </div>
            </div>

            <div class="input-group">
                <label>الجنس 👤</label>
                <select class="input-control">
                    <option value="male">ذكر 👨‍🎓</option>
                    <option value="female">أنثى 👩‍🎓</option>
                </select>
            </div>

            <!-- State & University Dynamic Selects -->
            <div class="input-row">
                <div class="input-group">
                    <label>الولاية 📍</label>
                    <select id="stateSelect" class="input-control" onchange="updateUniversities()">
                        <option value="">اختر الولاية</option>
                        <option value="algiers">الجزائر</option>
                        <option value="setif">سطيف</option>
                        <option value="oran">وهران</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>الجامعة 🏛️</label>
                    <select id="univSelect" class="input-control">
                        <option value="">اختر الجامعة تلقائياً</option>
                    </select>
                </div>
            </div>

            <!-- Section, Groupe, Sous-Groupe -->
            <div class="input-row">
                <div class="input-group">
                    <label>القسم (Section)</label>
                    <input type="text" class="input-control" placeholder="A / B / C">
                </div>
                <div class="input-group">
                    <label>المجموعة (Groupe)</label>
                    <input type="text" class="input-control" placeholder="G01">
                </div>
                <div class="input-group">
                    <label>الفرعية (Sous-groupe)</label>
                    <input type="text" class="input-control" placeholder="SG01">
                </div>
            </div>

            <button type="submit" class="btn-primary" style="margin-top: 10px;">إنشاء حساب جديد ✨</button>
        </form>

    </div>

    <!-- Decorative Nature Elements -->
    <div class="nature-decoration">🌱 🌿 🍃</div>

    <!-- Footer -->
    <footer class="app-footer">
        All rights reserved World of Nona 2026
    </footer>
</div>

<script>
    // Tab switching logic
    function switchTab(tabName) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.form-section').forEach(form => form.classList.remove('active'));

        if (tabName === 'login') {
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            document.getElementById('loginForm').classList.add('active');
        } else {
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            document.getElementById('signupForm').classList.add('active');
        }
    }

    // Dynamic mock universities selection
    const mockUniversities = {
        algiers: ["جامعة هواري بومدين (USTHB)", "جامعة بن يوسف بن خدة (الجزائر 1)"],
        setif: ["جامعة فرحات عباس (سطيف 1)"],
        oran: ["جامعة وهران 1 أحمد بن بلة"]
    };

    function updateUniversities() {
        const state = document.getElementById('stateSelect').value;
        const univSelect = document.getElementById('univSelect');
        univSelect.innerHTML = '<option value="">اختر الجامعة</option>';

        if (state && mockUniversities[state]) {
            mockUniversities[state].forEach(univ => {
                const opt = document.createElement('option');
                opt.value = univ;
                opt.textContent = univ;
                univSelect.appendChild(opt);
            });
        }
    }
</script>

</body>
</html>
