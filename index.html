<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تسجيل الدخول 🎓</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body class="login-body">

    <div class="login-wrapper">
        <div class="login-card">
            <div class="brand-badge">🎓</div>
            <h2>أهلاً بك! 👋</h2>
            <p class="subtitle">سجلي دخولك لمتابعة جدولك وحضورك اليومي</p>

            <form action="dashboard.html" method="GET">
                <div class="input-group">
                    <span class="input-icon">👤</span>
                    <input type="text" placeholder="اسم المستخدم / الرقم الجامعي" required>
                </div>

                <div class="input-group">
                    <span class="input-icon">🔒</span>
                    <input type="password" placeholder="كلمة المرور" required>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" checked> تذكرني
                    </label>
                    <a href="#" class="forgot-pass">نسيت كلمة المرور؟</a>
                </div>

                <button type="submit" class="primary-btn">تسجيل الدخول 🚀</button>
            </form>
        </div>

        <footer class="app-footer">
            All rights reserved World of Nona 2026
        </footer>
    </div>

    <!-- ربط ملف الجافا سكريبت -->
    <script src="script.js"></script>
</body>
</html>
