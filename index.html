<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <!-- هذا السطر هو المسؤول عن جعل التطبيق يتكيف مع شاشات الهواتف والكمبيوتر -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الطلاب - جامعة برج بوعريريج</title>
    <style>
        /* ألوان الباستيل المريحة للطلاب */
        :root {
            --pastel-blue: #E3F2FD;
            --pastel-pink: #FCE4EC;
            --pastel-green: #E8F5E9;
            --pastel-purple: #F3E5F5;
            --text-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--pastel-blue);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* شريط علوي يفصل بين اليمين واليسار */
        .top-bar {
            display: flex;
            justify-content: space-between; /* يفصل العناصر لأقصى اليمين واليسار */
            align-items: center;
            background-color: var(--pastel-pink);
            padding: 15px 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-weight: bold;
            flex-wrap: wrap; /* يتكيف مع الشاشات الصغيرة */
        }

        .container {
            flex-grow: 1;
            width: 90%;
            max-width: 1200px; /* لا يتجاوز هذا العرض في شاشات الكمبيوتر الكبيرة */
            margin: 20px auto;
            background-color: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        h1, h2 {
            text-align: center;
            color: #5E35B1;
        }

        /* أزرار ونماذج تفاعلية */
        .btn {
            background-color: #81C784;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px 0;
            width: 100%;
        }

        .btn:hover {
            background-color: #66BB6A;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box; /* لمنع خروج الحقل عن الشاشة */
        }

        /* قسم التسجيل مخفي افتراضياً */
        #registrationSection {
            display: none;
            background-color: var(--pastel-green);
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        /* تصميم متجاوب (Media Queries) للشاشات الصغيرة */
        @media (max-width: 600px) {
            .top-bar {
                flex-direction: column;
                text-align: center;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

    <!-- الشريط العلوي (التاريخ والوقت) -->
    <div class="top-bar">
        <div id="date-display">📅 التاريخ: جاري التحميل...</div>
        <div id="time-display">⏰ الوقت: جاري التحميل...</div>
    </div>

    <div class="container">
        <h1>مرحباً بكم في بوابة الطلاب 🎓</h1>
        <p style="text-align: center;">خاص بطلاب جامعة برج بوعريريج</p>

        <!-- زر لفتح قسم التسجيل -->
        <button class="btn" onclick="toggleRegistration()" style="background-color: #BA68C8;">➕ تسجيل طالب جديد</button>

        <!-- قسم تسجيل الطالب الجديد -->
        <div id="registrationSection">
            <h2>نموذج التسجيل 📝</h2>
            
            <div class="form-group">
                <label>رقم بطاقة الطالب (ID Card):</label>
                <input type="text" id="studentId" placeholder="أدخل رقم البطاقة هنا...">
            </div>

            <div class="form-group">
                <label>الجنس:</label>
                <select id="studentGender">
                    <option value="">-- اختر --</option>
                    <option value="ذكر">ذكر 👨‍🎓</option>
                    <option value="أنثى">أنثى 👩‍🎓</option>
                </select>
            </div>

            <div class="form-group">
                <label>البريد الإلكتروني الجامعي:</label>
                <input type="email" id="studentEmail" placeholder="example@univ.bba.dz">
            </div>

            <button class="btn" onclick="submitRegistration()">تأكيد التسجيل ✅</button>
            <p id="message" style="text-align: center; font-weight: bold; margin-top: 10px;"></p>
        </div>

    </div>

    <!-- كود الجافاسكربت لتشغيل الوقت والتأكد من الإيميل -->
    <script>
        // دالة لعرض الوقت والتاريخ بجهتين مختلفتين
        function updateDateTime() {
            const now = new Date();
            
            // ضبط التاريخ (أقصى اليمين حسب اتجاه الصفحة rtl)
            const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date-display').innerText = '📅 التاريخ: ' + now.toLocaleDateString('ar-DZ', dateOptions);
            
            // ضبط الوقت (أقصى اليسار)
            const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('time-display').innerText = '⏰ الوقت: ' + now.toLocaleTimeString('ar-DZ', timeOptions);
        }
        
        // تحديث الوقت كل ثانية
        setInterval(updateDateTime, 1000);
        updateDateTime();

        // إظهار وإخفاء نموذج التسجيل
        function toggleRegistration() {
            const section = document.getElementById('registrationSection');
            if (section.style.display === 'none' || section.style.display === '') {
                section.style.display = 'block';
            } else {
                section.style.display = 'none';
            }
        }

        // دالة التحقق من التسجيل (بما في ذلك شرط إيميل الجامعة)
        function submitRegistration() {
            const id = document.getElementById('studentId').value;
            const gender = document.getElementById('studentGender').value;
            const email = document.getElementById('studentEmail').value;
            const messageBox = document.getElementById('message');

            if (id === '' || gender === '' || email === '') {
                messageBox.style.color = 'red';
                messageBox.innerText = '⚠️ يرجى ملء جميع الحقول أولاً.';
                return;
            }

            // التحقق من نهاية الإيميل
            if (!email.endsWith('@univ.bba.dz')) {
                messageBox.style.color = 'red';
                messageBox.innerText = '❌ عذراً، هذا التطبيق مخصص لطلاب جامعتنا فقط. يجب أن ينتهي البريد بـ @univ.bba.dz';
                return;
            }

            // في حال نجاح الشروط
            messageBox.style.color = 'green';
            messageBox.innerText = '🎉 تم تسجيل الطالب بنجاح!';
            
            // تفريغ الحقول بعد التسجيل
            setTimeout(() => {
                document.getElementById('studentId').value = '';
                document.getElementById('studentGender').value = '';
                document.getElementById('studentEmail').value = '';
                messageBox.innerText = '';
                toggleRegistration(); // إغلاق النافذة
            }, 3000);
        }
    </script>
</body>
</html>
