<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World of Nona 🎓</title>

    <!-- إعدادات تطبيق الـ PWA 📱 -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4A90E2">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3429/3429149.png">

    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/components.css">

    <style>
        .hero-card {
            text-align: center;
            padding: 50px 20px;
            max-width: 550px;
            margin: 40px auto;
        }

        .hero-card h1 {
            font-size: 28px;
            color: var(--primary-color, #4A90E2);
            margin-bottom: 15px;
        }

        .hero-card p {
            color: #666666;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .hero-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .hero-actions .btn {
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            display: inline-block;
        }
    </style>
</head>
<body>

    <header id="main-navbar">
        <!-- سيتم تحميل القائمة العلوية هنا تلقائياً -->
    </header>

    <main id="app-content">
        <section class="card hero-card">
            <h1>مرحباً بكِ في World of Nona 🌟</h1>
            <p>منصتكِ الدراسية الذكية لإدارة الجدول، الحضور، والنتائج الأكاديمية بكل سهولة ورتابة 📚✨</p>
            
            <div class="hero-actions">
                <a href="pages/auth/login.html" class="btn btn-primary">تسجيل الدخول 🔑</a>
                <a href="pages/dashboard/dashboard.html" class="btn btn-secondary">لوحة التحكم 📊</a>
            </div>
        </section>
    </main>

    <footer id="main-footer" style="text-align: center; padding: 20px; color: #888; margin-top: 40px;">
        <p>All rights reserved World of Nona 2026</p>
    </footer>

    <script src="assets/js/global.js"></script>
</body>
</html>
