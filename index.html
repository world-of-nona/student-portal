<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World of Nona 🎓🌿 - تسجيل الدخول</title>
    <!-- خط Tajawal للواجهة + خط Caveat اليدوي للشعار -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Pastel Palette */
            --primary-pastel: #74C69D;
            --primary-dark: #2B4C3F;
            --accent-yellow: #FFD166;
            --accent-pink: #FFB7B2;
            --bg-cream: #F4F7F4;
            --card-bg: #FFFFFF;
            --text-main: #2D3748;
            --text-muted: #8C9BA5;
            
            /* Claymorphic 3D Shadows */
            --clay-shadow-card: 0 20px 40px rgba(116, 198, 157, 0.18), inset 0 2px 3px #FFFFFF;
            --clay-shadow-btn: 0 8px 16px rgba(116, 198, 157, 0.35);
            --clay-shadow-input: inset 0 2px 5px rgba(0, 0, 0, 0.05), 0 2px 4px #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-cream);
            background-image: radial-gradient(#74c69d25 1.5px, transparent 1.5px);
            background-size: 24px 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .mobile-card {
            width: 100%;
            max-width: 420px;
            background: #FFFFFF;
            border-radius: 32px;
            box-shadow: var(--clay-shadow-card);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 4px solid #FFFFFF;
        }

        .app-header {
            background: linear-gradient(180deg, #E8F5E9 0%, #FFFFFF 100%);
            padding: 28px 20px 15px 20px;
            text-align: center;
            position: relative;
        }

        .logo-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .svg-logo-container {
            filter: drop-shadow(0px 8px 12px rgba(116, 198, 157, 0.25));
            transition: transform 0.3s ease;
        }

        .svg-logo-container:hover {
            transform: scale(1.03) rotate(-1deg);
        }

        .handwritten-brand {
            font-family: 'Caveat', cursive;
            font-size: 42px;
            color: var(--primary-dark);
            font-weight: 700;
            margin-top: -10px;
            letter-spacing: 1px;
            text-shadow: 2px 2px 0px #FFFFFF;
        }

        .app-header p {
            font-size: 13px;
            color: var(--primary-dark);
            font-weight: 700;
            opacity: 0.85;
            margin-top: 2px;
        }

        .tab-switcher {
            display: flex;
            background: #EBF4EF;
            margin: 15px 22px 10px 22px;
            padding: 6px;
            border-radius: 20px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.04);
        }

        .tab-btn {
            flex: 1;
            padding: 11px;
            border: none;
            background: transparent;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-muted);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: #FFFFFF;
            color: var(--primary-dark);
            box-shadow: 0 6px 15px rgba(0,0,0,0.06);
            transform: translateY(-1px);
        }

        .form-container {
            padding: 15px 22px 25px 22px;
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 6px;
            padding-right: 4px;
        }

        .input-control {
            width: 100%;
            padding: 13px 16px;
            border: 2px solid #F0F4F1;
            border-radius: 16px;
            font-size: 13.5px;
            background-color: #F8FAF8;
            outline: none;
            box-shadow: var(--clay-shadow-input);
            color: var(--text-main);
            transition: all 0.2s ease;
        }

        .input-control:focus {
            border-color: var(--primary-pastel);
            background-color: #FFFFFF;
            box-shadow: 0 0 0 4px rgba(116, 198, 157, 0.18);
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        .input-row .input-group {
            flex: 1;
        }

        .otp-box {
            display: flex;
            gap: 8px;
        }

        .btn-otp {
            padding: 0 14px;
            background-color: #E2F3E9;
            color: var(--primary-dark);
            border: 1.5px solid var(--primary-pastel);
            border-radius: 16px;
            font-size: 11.5px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }

        .remember-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 12px;
            color: var(--primary-dark);
            font-weight: 700;
        }

        .remember-select {
            padding: 6px 10px;
            border-radius: 12px;
            border: 1.5px solid #E2E8F0;
            background: #F8FAF8;
            font-size: 11px;
            outline: none;
            color: var(--text-main);
            font-weight: 700;
        }

        .btn-primary {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #74C69D 0%, #2A9D8F 100%);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: var(--clay-shadow-btn);
            transition: all 0.2s;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .divider {
            text-align: center;
            margin: 16px 0;
            font-size: 11.5px;
            color: var(--text-muted);
            font-weight: 700;
        }

        .btn-guest {
            width: 100%;
            padding: 13px;
            background: #F4F8F5;
            color: var(--primary-dark);
            border: 2px dashed #B7E4C7;
            border-radius: 20px;
            font-size: 13.5px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-guest:hover {
            background: #E8F4EC;
        }

        .nature-decoration {
            text-align: center;
            padding: 12px 0 6px 0;
            font-size: 20px;
            user-select: none;
        }

        .app-footer {
            text-align: center;
            font-size: 10.5px;
            color: var(--text-muted);
            padding: 14px 0;
            border-top: 1px solid #F0F4F1;
            direction: ltr;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="mobile-card">
    <header class="app-header">
        <div class="logo-wrapper">
            <div class="svg-logo-container">
                <svg width="135" height="120" viewBox="0 0 200 180" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="100" cy="112" r="52" fill="#E8F5E9" stroke="#74C69D" stroke-width="3.5"/>
                    <ellipse cx="100" cy="112" rx="26" ry="52" stroke="#B7E4C7" stroke-width="1.2" stroke-dasharray="3 2"/>
                    <line x1="48" y1="112" x2="152" y2="112" stroke="#B7E4C7" stroke-width="1.2" stroke-dasharray="3 2"/>

                    <path d="M86 82 C96 80 114 80 120 88 C124 94 116 102 118 108 C122 114 116 122 110 132 C105 138 98 144 94 142 C92 136 94 128 88 122 C84 118 78 112 80 102 C82 94 80 88 86 82 Z" fill="#95D5B2"/>
                    <ellipse cx="125" cy="122" rx="3.5" ry="8" fill="#95D5B2" transform="rotate(-15 125 122)"/>

                    <path d="M84 72 C92 66 112 66 128 70 C120 78 106 78 88 76 Z" fill="#B7E4C7"/>
                    <path d="M51 86 C58 92 56 104 51 118 C48 108 48 96 51 86 Z" fill="#B7E4C7"/>

                    <path d="M132 82 A 48 48 0 0 0 100 64" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.9"/>

                    <path d="M78 52 C78 52 82 64 100 64 C118 64 122 52 122 52 Z" fill="#1F7268"/>
                    <polygon points="100,20 155,38 100,54 45,38" fill="#2A9D8F" stroke="#1F7268" stroke-width="2"/>
                    <polygon points="100,20 45,38 100,54" fill="#52B788"/>
                    
                    <circle cx="100" cy="37" r="4" fill="#FFD166"/>
                    <path d="M100 37 C122 38 138 48 140 64" stroke="#FFD166" stroke-width="3" fill="none" stroke-linecap="round"/>
                    <polygon points="136,64 144,64 146,74 134,74" fill="#FFD166"/>
                </svg>
            </div>
            <div class="handwritten-brand">World of Nona</div>
        </div>
        <p>منصة علوم الطبيعة والحياة - L1 SNV 🎓🌱</p>
    </header>

    <div class="tab-switcher">
        <button class="tab-btn active" onclick="switchTab('login')">تسجيل الدخول</button>
        <button class="tab-btn" onclick="switchTab('signup')">إنشاء حساب</button>
    </div>

    <div class="form-container">
        
        <!-- عند تقديم النموذج، يتوجه تلقائياً لصفحة dashboard.html -->
        <form id="loginForm" class="form-section active" onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
            <div class="input-group">
                <label>البريد الإلكتروني أو رقم البطاقة 🪪</label>
                <input type="text" class="input-control" placeholder="أدخل البريد الجامعي أو الرقم" required>
            </div>

            <div class="input-group">
                <label>كلمة المرور 🔒</label>
                <input type="password" class="input-control" placeholder="••••••••" required>
            </div>

            <div class="remember-container">
                <label>☑️ تذكرني في هذا الجهاز:</label>
                <select class="remember-select">
                    <option value="week">لمدة أسبوع</option>
                    <option value="month">لمدة شهر</option>
                    <option value="year">لمدة سنة</option>
                </select>
            </div>

            <button type="submit" class="btn-primary">دخول للحساب 🚀</button>

            <div class="divider">أو للتصفح السريع</div>

            <!-- عند الضغط على هذا الزر يذهب فوراً لصفحة dashboard.html -->
            <button type="button" class="btn-guest" onclick="window.location.href='dashboard.html';">الدخول كضيف 👤</button>
        </form>

        <form id="signupForm" class="form-section" onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
            <div class="input-group">
                <label>رقم بطاقة الطالب / البريد الجامعي 📧</label>
                <div class="otp-box">
                    <input type="text" class="input-control" placeholder="student@univ.dz" required>
                    <button type="button" class="btn-otp">إرسال الرمز 📩</button>
                </div>
            </div>

            <div class="input-group">
                <label>كود التحقق (OTP) 🔑</label>
                <input type="text" class="input-control" placeholder="أدخل الكود المكون من 4 أرقام">
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label>كلمة المرور 🔒</label>
                    <input type="password" class="input-control" placeholder="••••••••" required>
                </div>
                <div class="input-group">
                    <label>تأكيد المرور 🔒</label>
                    <input type="password" class="input-control" placeholder="••••••••" required>
                </div>
            </div>

            <div class="input-group">
                <label>الجنس 👤</label>
                <select class="input-control">
                    <option value="male">ذكر 👨‍🎓</option>
                    <option value="female">أنثى 👩‍🎓</option>
                </select>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label>الولاية 📍</label>
                    <select id="stateSelect" class="input-control" onchange="updateUniversities()">
                        <option value="">اختر الولاية</option>
                        <option value="algiers">الجزائر</option>
                        <option value="setif">سطيف</option>
                        <option value="oran">وهران</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>الجامعة 🏛️</label>
                    <select id="univSelect" class="input-control">
                        <option value="">اختر الجامعة تلقائياً</option>
                    </select>
                </div>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label>القسم (Section)</label>
                    <input type="text" class="input-control" placeholder="A / B / C">
                </div>
                <div class="input-group">
                    <label>المجموعة (Groupe)</label>
                    <input type="text" class="input-control" placeholder="G01">
                </div>
                <div class="input-group">
                    <label>الفرعية (Sous-groupe)</label>
                    <input type="text" class="input-control" placeholder="SG01">
                </div>
            </div>

            <button type="submit" class="btn-primary" style="margin-top: 10px;">إنشاء حساب جديد ✨</button>
        </form>

    </div>

    <div class="nature-decoration">🌱 🌿 🍃</div>

    <footer class="app-footer">
        All rights reserved World of Nona 2026
    </footer>
</div>

<script>
    function switchTab(tabName) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.form-section').forEach(form => form.classList.remove('active'));

        if (tabName === 'login') {
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            document.getElementById('loginForm').classList.add('active');
        } else {
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            document.getElementById('signupForm').classList.add('active');
        }
    }

    const mockUniversities = {
        algiers: ["جامعة هواري بومدين (USTHB)", "جامعة بن يوسف بن خدة (الجزائر 1)"],
        setif: ["جامعة فرحات عباس (سطيف 1)"],
        oran: ["جامعة وهران 1 أحمد بن بلة"]
    };

    function updateUniversities() {
        const state = document.getElementById('stateSelect').value;
        const univSelect = document.getElementById('univSelect');
        univSelect.innerHTML = '<option value="">اختر الجامعة</option>';

        if (state && mockUniversities[state]) {
            mockUniversities[state].forEach(univ => {
                const opt = document.createElement('option');
                opt.value = univ;
                opt.textContent = univ;
                univSelect.appendChild(opt);
            });
        }
    }
</script>

</body>
</html>
